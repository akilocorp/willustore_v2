name: Deploy to Server

on:
  push:
    branches:
      - main

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Build
        run: npm run build

      - name: Deploy via SSH
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.SSH_HOST }}
          username: ${{ secrets.SSH_USER }}
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          port: ${{ secrets.SSH_PORT }}
          script: |
            if [ -d "/var/www/willustore/.git" ]; then
              cd /var/www/willustore && git pull origin main
            else
              rm -rf /var/www/willustore
              git clone https://github.com/akilocorp/willustore_v2.git /var/www/willustore
              cd /var/www/willustore
            fi
            cd /var/www/willustore
            npm ci
            npm run build
            pm2 delete willustore 2>/dev/null || true
            pm2 start npm --name willustore --cwd /var/www/willustore -- start
            pm2 save
